<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Simulador Logístico</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TELA INICIAL -->
<div id="splash" class="splash">
  <h1>Simulador de Centro de Distribuição</h1>
  <p>Feito com carinho para a ADM5</p>
  <button onclick="iniciarSimulador()">Iniciar Simulador</button>
</div>

<header>
  <h1>📦 Simulador Logístico</h1>
  <p>Rodada <span id="rodada"></span> | Etapa: <span id="etapa"></span></p>
</header>

<section class="status">
  <div class="status-card">💰 Caixa: <span id="caixa"></span></div>
  <div class="status-card">📦 Espaço: <span id="ocupado"></span>/<span id="capacidade"></span></div>
  <div class="status-card">❄️ Freezer: <span id="freezer"></span></div>
  <div class="status-card">📦 Embalagem: <span id="embalagem"></span></div>
</section>

<section id="conteudo"></section>

<button id="btnAvancar" onclick="avancar()">➡️ Próxima Etapa</button>

<script src="script.js"></script>
</body>
</html>
